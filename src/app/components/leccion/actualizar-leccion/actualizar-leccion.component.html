<app-docente-header></app-docente-header>
<a href=""></a>

<div class="container-fluid bg-dark text-light min-vh-100">
  <div class="row">

    <nav class="col-md-3 col-lg-2 sidebar d-md-block p-3">
      <h5 class="fw-bold mb-4">Panel Docente</h5>
      <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
        <button class="nav-link active" id="v-pills-cursos-tab" data-bs-toggle="pill" data-bs-target="#v-pills-cursos" type="button" role="tab">📚 Cursos Dictados</button>
        <button class="nav-link text-white-50" id="v-pills-comunicacion-tab" data-bs-toggle="pill" data-bs-target="#v-pills-comunicacion" type="button" role="tab">💬 Comunicación</button>
        <button class="nav-link text-white-50" id="v-pills-rendimiento-tab" data-bs-toggle="pill" data-bs-target="#v-pills-rendimiento" type="button" role="tab">📊 Rendimiento</button>
      </div>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <div class="tab-content" id="v-pills-tabContent">

        <div class="tab-pane fade show active" id="v-pills-cursos" role="tabpanel" aria-labelledby="v-pills-cursos-tab">
          
          <div class="card shadow-sm border-0 bg-secondary text-white rounded-3">
            <div class="card-header bg-primary text-white fw-bold text-center border-0">
              <h2><strong>Actualizar Lección</strong></h2>
            </div>
            <div class="card-body p-4">
              <div class="d-flex justify-content-center mb-4">
                <img src="img/seccion/updSeccion.png" width="200" height="200" class="img-fluid" alt="Imagen del curso">
              </div>
              
              <form class="row g-4" (ngSubmit)="actualizarSeccion()" *ngIf="leccion.idLeccion > 0">

                <div class="col-md-4">
                  <label class="form-label fw-semibold">Nombre Lección</label>
                  <input type="text" class="form-control bg-dark text-white border-dark" name="nombreLeccion" [(ngModel)]="leccion.nombreLeccion" required>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Duración (minutos)</label>
                    <input type="number" class="form-control bg-dark text-white border-dark" name="duracion" [(ngModel)]="leccion.duracion" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Orden Lección</label>
                    <input type="number" class="form-control bg-dark text-white border-dark" name="ordenLeccion" [(ngModel)]="leccion.ordenLeccion" required>
                </div>

                <div class="col-md-12 mt-4 p-4 border border-dark rounded bg-dark bg-opacity-50">
                  <label class="form-label fw-bold mb-3 text-warning">Recursos y Materiales (Subir Archivos)</label>
                  
                  <div *ngFor="let material of leccion.materiales; let i = index" class="row mb-3 align-items-center">
                    <div class="col-md-5">
                      <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Nombre (Ej: Manual PDF)" [(ngModel)]="leccion.materiales[i].nombreArchivo" name="nombreArchivo{{i}}">
                    </div>
                    
                    <div class="col-md-6">
                      <input type="file" class="form-control bg-dark text-white border-secondary" (change)="seleccionarArchivo($event, i)" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg">
                      <small class="text-info mt-1 d-block" *ngIf="material.urlMaterial && !material.archivoFisico">
                        <i class="bi bi-cloud-check me-1"></i> Archivo actual guardado en el servidor.
                      </small>
                    </div>
                    
                    <div class="col-md-1">
                      <button type="button" class="btn btn-outline-danger w-100" (click)="quitarMaterial(i)" title="Quitar material">
                        <i class="bi bi-trash"></i>
                      </button>
                    </div>
                  </div>

                  <button type="button" class="btn btn-outline-primary btn-sm mt-2" (click)="agregarMaterial()">
                    ➕ Añadir Material
                  </button>
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-semibold">Estado</label>
                  <select class="form-select bg-dark text-white border-dark" name="estado" [(ngModel)]="leccion.estado" required>
                    <option [value]="1">Activo</option>
                    <option [value]="0">Inactivo</option>
                  </select>
                </div>

                <div class="col-md-8">
                  <label for="urlVideo" class="form-label fw-semibold">Link del Video (YouTube)</label>
                  <input type="text" id="urlVideo" name="urlVideo" [(ngModel)]="leccion.urlVideo" class="form-control bg-dark text-white border-dark">
                </div>

                <div class="col-md-12 mt-4 p-4 border border-dark rounded bg-dark bg-opacity-50" *ngIf="leccion.urlVideo">
                  <label class="fw-bold mb-3 text-warning">Vista previa del video:</label>
                  <div class="video-container d-flex justify-content-center">
                    <div class="ratio ratio-16x9 w-75 rounded overflow-hidden shadow-sm">
                      <iframe [src]="leccion.urlVideo | safeUrl" title="Vista previa" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    </div>
                  </div>
                </div>

                <div class="col-12 d-flex justify-content-end gap-3 mt-4 pt-3 border-top border-dark">
                  <button type="button" class="btn btn-secondary px-4" (click)="cancelar()">Cancelar</button>
                  <button type="submit" class="btn btn-success px-4">Actualizar Lección</button>
                </div>

              </form>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
