<app-docente-header></app-docente-header>
<a href=""></a>

<div class="container-fluid bg-dark text-light min-vh-100">
  <div class="row">

    <nav class="col-md-3 col-lg-2 sidebar d-md-block p-3">
      <h5 class="fw-bold mb-4">Panel Docente</h5>
      <div class="nav flex-column nav-pills" role="tablist" aria-orientation="vertical">
        <button class="nav-link active">📚 Cursos Dictados</button>
        <button class="nav-link text-white-50">💬 Comunicación</button>
        <button class="nav-link text-white-50">📊 Rendimiento</button>
      </div>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <div class="card shadow-sm border-0 bg-secondary text-white rounded-3">
        <div class="card-header bg-primary text-white fw-bold text-center border-0">
          <h2><strong>Crear Nueva Lección</strong></h2>
        </div>
        <div class="card-body p-4">
          <div class="d-flex justify-content-center mb-4">
            <img src="img/seccion/insertSeccion.png" width="200" height="200" class="img-fluid" alt="Imagen del curso">
          </div>
          
          <form class="row g-4" (ngSubmit)="registrarSeccion()" #formLeccion="ngForm">

            <div class="col-md-4">
              <label class="form-label fw-semibold">Nombre Lección</label>
              <input type="text" class="form-control bg-dark text-white border-dark" name="nombreLeccion" [(ngModel)]="nuevaLeccion.nombreLeccion" required>
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-semibold">Duración (minutos)</label>
                <input type="number" class="form-control bg-dark text-white border-dark" name="duracion" [(ngModel)]="nuevaLeccion.duracion" required>
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">Orden Lección</label>
                <input type="number" class="form-control bg-dark text-white border-dark" name="ordenLeccion" [(ngModel)]="nuevaLeccion.ordenLeccion" required>
            </div>

            <div class="col-md-12 mt-4 p-4 border border-dark rounded bg-dark bg-opacity-50">
              <label class="form-label fw-bold mb-3 text-warning">Recursos y Materiales (Subir Archivos)</label>
              
              <div *ngFor="let material of nuevaLeccion.materiales; let i = index" class="row mb-3 align-items-center">
                <div class="col-md-5">
                  <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Nombre (Ej: Manual PDF)" [(ngModel)]="nuevaLeccion.materiales[i].nombreArchivo" name="nombreArchivo{{i}}">
                </div>
                
                <div class="col-md-6">
                  <input type="file" class="form-control bg-dark text-white border-secondary" (change)="onFileSelected($event, i)" name="archivoMaterial{{i}}" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg">
                </div>
                
                <div class="col-md-1">
                  <button type="button" class="btn btn-outline-danger w-100" (click)="quitarMaterial(i)" title="Eliminar material">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>

              <button type="button" class="btn btn-outline-primary btn-sm mt-2" (click)="agregarMaterial()">
                ➕ Añadir Material
              </button>
            </div>

            <div class="col-md-12 mt-3">
              <label for="urlVideo" class="form-label fw-semibold">Link del Video de YouTube</label>
              <input type="text" class="form-control bg-dark text-white border-dark" id="urlVideo" name="urlVideo" [(ngModel)]="nuevaLeccion.urlVideo" (ngModelChange)="actualizarVistaPreviaVideo()" placeholder="Ej: https://www.youtube.com/watch?v=...">
            </div>

            <div class="col-md-12 mt-4 p-4 border border-dark rounded bg-dark bg-opacity-50" *ngIf="videoUrlSegura">
              <label class="fw-bold mb-3 text-warning">Vista Previa del Video</label>
              <div class="ratio ratio-16x9 w-75 mx-auto shadow-sm rounded overflow-hidden">
                <iframe [src]="videoUrlSegura" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
              </div>
            </div>

            <div class="col-12 d-flex justify-content-end gap-3 mt-4 pt-3 border-top border-dark">
              <button type="button" class="btn btn-secondary px-4" (click)="cancelar()">Cancelar</button>
              <button type="submit" class="btn btn-success px-4" [disabled]="!formLeccion.form.valid">Guardar Lección</button>
            </div>

          </form>
        </div>
      </div>
    </main>
  </div>
</div>
