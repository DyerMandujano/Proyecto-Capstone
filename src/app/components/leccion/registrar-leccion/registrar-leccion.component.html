<app-docente-header></app-docente-header>
<a href=""></a>

<!-- Layout principal -->
<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <nav class="col-md-3 col-lg-2 sidebar d-md-block p-3">
      <h5 class="fw-bold mb-4">Panel Docente</h5>
      <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
        <button class="nav-link active" id="v-pills-cursos-tab" data-bs-toggle="pill" data-bs-target="#v-pills-cursos" type="button" role="tab">📚 Cursos Dictados</button>
        <button class="nav-link" id="v-pills-comunicacion-tab" data-bs-toggle="pill" data-bs-target="#v-pills-comunicacion" type="button" role="tab">💬 Comunicación</button>
        <button class="nav-link" id="v-pills-rendimiento-tab" data-bs-toggle="pill" data-bs-target="#v-pills-rendimiento" type="button" role="tab">📊 Rendimiento</button>
      </div>
    </nav>

    <!-- Contenido -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <div class="tab-content" id="v-pills-tabContent">

        <!-- Cursos Dictados -->
        <div class="tab-pane fade show active" id="v-pills-cursos" role="tabpanel" aria-labelledby="v-pills-cursos-tab">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white fw-bold text-center">
              <h2><strong>Crear Nueva Leccion</strong></h2>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-center mb-3">
        <img src="img/seccion/insertSeccion.png" width="200" height="200" class="img-fluid mb-3" alt="Imagen del curso">
      </div>
              <form class="row g-3" class="row g-3" (ngSubmit)="registrarSeccion()" #formLeccion="ngForm">
 <!-- Cursos 
                <input type="number"
                    class="form-control"
                    id="idseccion"
                    name="idseccion"
                    [(ngModel)]="nuevaLeccion.idSeccion"
                    readonly>Dictados -->

                <div class="col-md-4">
                  <label class="form-label fw-semibold">Nombre Leccion</label>
                  <input type="text" 
                  class="form-control"
                   name="nombreLeccion"
                   [(ngModel)]="nuevaLeccion.nombreLeccion"
                   required>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Duración</label>
                    <input type="number" class="form-control"
                          name="duracion"
                          [(ngModel)]="nuevaLeccion.duracion"
                          placeholder="en min..." required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Orden Leccion</label>
                    <input type="number" class="form-control"
                          name="ordenLeccion"
                          [(ngModel)]="nuevaLeccion.ordenLeccion"
                          placeholder="Ej: 2" required>
                </div>

                <div class="col-md-12 mt-3 p-3 border rounded bg-light">
                  <label class="form-label fw-bold mb-3">Recursos y Materiales (Opcional)</label>
                  
                  <div *ngFor="let material of nuevaLeccion.materiales; let i = index" class="row mb-2 align-items-center">
                    <div class="col-md-5">
                      <input type="text" class="form-control" placeholder="Nombre (Ej: Manual PDF)" [(ngModel)]="nuevaLeccion.materiales[i].nombreArchivo" name="nombreArchivo{{i}}">
                    </div>
                    <div class="col-md-6">
                      <input type="text" class="form-control" placeholder="Link del archivo (Google Drive, etc.)" [(ngModel)]="nuevaLeccion.materiales[i].urlMaterial" name="urlMaterial{{i}}">
                    </div>
                    <div class="col-md-1">
                      <button type="button" class="btn btn-danger w-100" (click)="quitarMaterial(i)" title="Eliminar material">X</button>
                    </div>
                  </div>

                  <button type="button" class="btn btn-outline-primary btn-sm mt-2" (click)="agregarMaterial()">
                    ➕ Añadir Material
                  </button>
                </div>

                <div class="col-md-12">
                  <label for="urlVideo" class="form-label fw-semibold">Link del Video</label>
                  <input type="text" 
                        class="form-control" 
                        id="urlVideo" 
                        name="urlVideo" 
                        [(ngModel)]="nuevaLeccion.urlVideo" 
                        placeholder="Ej: https://www.youtube.com/watch?v=...">
                </div>

                <div class="col-12 d-flex justify-content-end gap-3 mt-3">
                  <button type="submit" class="btn btn-success px-4">Guardar Leccion</button>
                  <button type="reset" class="btn btn-secondary px-4">Limpiar</button>
                </div>

              </form>
            </div>
          </div>
        </div>

        <!-- Comunicación -->
        <div class="tab-pane fade" id="v-pills-comunicacion" role="tabpanel" aria-labelledby="v-pills-comunicacion-tab">
          <h5>Sección de Comunicación</h5>
        </div>

        <!-- Rendimiento -->
        <div class="tab-pane fade" id="v-pills-rendimiento" role="tabpanel" aria-labelledby="v-pills-rendimiento-tab">
          <h5>Panel de Rendimiento</h5>
        </div>

      </div>
    </main>
  </div>
</div>
